<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportsTracker — Tu lista de series deportivas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚽</span>
        <span class="logo-text">Sports<em>Tracker</em></span>
      </div>
      <nav class="header-actions">
        <button class="btn-export" id="btnExportCSV">↓ CSV</button>
        <button class="btn-export" id="btnExportXLSX">↓ Excel</button>
        <button class="btn-primary" id="btnNewSeries">+ Nueva serie</button>
      </nav>
    </div>
  </header>

  <!-- FILTERS BAR -->
  <section class="filters-bar">
    <div class="filters-inner">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar por título, deporte…" autocomplete="off" />
      </div>
      <div class="filter-group">
        <select id="filterStatus">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente</option>
          <option value="watching">Viendo</option>
          <option value="completed">Completado</option>
          <option value="dropped">Abandonado</option>
        </select>
        <select id="filterSport">
          <option value="">Todos los deportes</option>
        </select>
        <select id="sortField">
          <option value="created_at">Recientes</option>
          <option value="title">Título</option>
          <option value="sport">Deporte</option>
          <option value="year">Año</option>
          <option value="rating">Rating</option>
        </select>
        <button class="btn-order" id="btnOrder" title="Cambiar orden">↑↓</button>
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <span id="statTotal">0 series</span>
      <span class="dot">·</span>
      <span id="statWatching">0 viendo</span>
      <span class="dot">·</span>
      <span id="statCompleted">0 completadas</span>
    </div>

    <!-- Grid -->
    <div class="series-grid" id="seriesGrid">
      <!-- cards inyectadas por JS -->
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🏟️</div>
      <h2>No hay series aún</h2>
      <p>Agrega tu primera serie deportiva para empezar.</p>
      <button class="btn-primary" onclick="openCreateModal()">+ Agregar serie</button>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </main>

  <!-- MODAL: Create / Edit series -->
  <div class="modal-overlay" id="seriesModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <h2 class="modal-title" id="modalTitle">Nueva serie</h2>

      <form id="seriesForm" novalidate>
        <input type="hidden" id="seriesId" />

        <div class="form-row">
          <div class="form-group">
            <label>Título <span class="required">*</span></label>
            <input type="text" id="fieldTitle" placeholder="Drive to Survive" maxlength="200" />
            <span class="field-error" id="errTitle"></span>
          </div>
          <div class="form-group">
            <label>Deporte <span class="required">*</span></label>
            <input type="text" id="fieldSport" placeholder="Fórmula 1" />
            <span class="field-error" id="errSport"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Plataforma</label>
            <input type="text" id="fieldPlatform" placeholder="Netflix, ESPN+" />
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="fieldStatus">
              <option value="pending">Pendiente</option>
              <option value="watching">Viendo</option>
              <option value="completed">Completado</option>
              <option value="dropped">Abandonado</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Episodios</label>
            <input type="number" id="fieldEpisodes" min="0" placeholder="10" />
          </div>
          <div class="form-group">
            <label>Año</label>
            <input type="number" id="fieldYear" min="1900" max="2100" placeholder="2024" />
          </div>
        </div>

        <div class="form-group full-width">
          <label>Descripción</label>
          <textarea id="fieldDescription" rows="3" placeholder="¿De qué trata?"></textarea>
        </div>

        <div class="form-group full-width">
          <label>URL de imagen</label>
          <input type="text" id="fieldImageURL" placeholder="https://..." />
          <span class="hint">O sube una imagen abajo (máx. 1MB)</span>
        </div>

        <div class="form-group full-width" id="imageUploadGroup">
          <label>Subir imagen</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fieldImageFile" accept="image/*" />
            <span>Arrastra o haz click para seleccionar</span>
          </div>
          <div class="upload-preview" id="uploadPreview"></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-ghost" id="btnCancelModal">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnSaveSeries">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: Detail / Rating -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-detail">
      <button class="modal-close" id="detailModalClose">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
